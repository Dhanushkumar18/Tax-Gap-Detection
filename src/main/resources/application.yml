spring:
  application:
    name: tax-gap-detection
  sql:
    init:
      mode: always
  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  datasource:
    url: jdbc:h2:mem:taxgapdb
    driverClassName: org.h2.Driver
    username: sa
    password:

server:
  servlet:
    context-path: /
  port: 8080

logging:
  level:
    root: INFO
    com.taxgap: DEBUG
    org.springframework.security: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      show-details: always
