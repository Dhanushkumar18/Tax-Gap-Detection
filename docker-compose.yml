version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: taxgap-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: taxgapdb
      MYSQL_USER: taxgap
      MYSQL_PASSWORD: taxgap123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - taxgap-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taxgap-app
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/taxgapdb
      SPRING_DATASOURCE_USERNAME: taxgap
      SPRING_DATASOURCE_PASSWORD: taxgap123
      SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - taxgap-network

networks:
  taxgap-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local
